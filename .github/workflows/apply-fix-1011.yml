name: Jednorazowa poprawka 1.0.11

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-fix-1011
  cancel-in-progress: false

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci --no-audit --no-fund

      - name: Zastosuj poprawkę 1.0.11
        run: python3 tools/apply_fix_1011.py

      - name: Usuń jednorazowe pliki
        run: |
          rm -f tools/apply_fix_1011.py
          rm -f .github/workflows/apply-fix-1011.yml

      - name: Zbuduj PWA i zasoby Androida
        run: npm run prepare:web

      - name: Uruchom testy
        run: npm test

      - name: Zapisz poprawki
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Wersja 1.0.11 - poprawiona Historia i ampułki'
          git push origin main
