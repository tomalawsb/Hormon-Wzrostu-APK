name: Jednorazowa poprawka interfejsu 1.0.10

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-fix-1010
  cancel-in-progress: false

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 tools/apply_fix_1010.py
      - run: npm run prepare:web
      - run: npm test
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git rm -f .github/workflows/apply-fix-1010.yml tools/apply_fix_1010.py
          git commit -m "Wersja 1.0.10 - przywrócone rozmiary i stała nawigacja"
          git push origin main
