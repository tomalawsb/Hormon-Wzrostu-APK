name: Diagnostyka ustawień czcionki

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  font-settings-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci --no-audit --no-fund

      - name: Zbuduj pliki webowe
        run: npm run prepare:web

      - name: Sprawdź składnię JavaScript
        run: npm run lint:js

      - name: Sprawdź formatowanie
        run: npm run format:check

      - name: Uruchom test projektu i zachowaj wynik
        id: project_test
        shell: bash
        run: |
          set +e
          npm run test:project > project-test-output.txt 2>&1
          EXIT_CODE=$?
          cat project-test-output.txt
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Opublikuj błąd testu w pull requeście
        if: steps.project_test.outputs.exit_code != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Wynik testu projektu'
            echo
            echo '```text'
            cat project-test-output.txt
            echo '```'
          } > project-test-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file project-test-comment.md

      - name: Zatrzymaj diagnostykę po błędzie
        if: steps.project_test.outputs.exit_code != '0'
        run: exit 1

      - name: Uruchom test wyglądu
        run: npm run test:visual
