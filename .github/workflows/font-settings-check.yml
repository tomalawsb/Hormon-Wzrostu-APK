name: Diagnostyka ustawień czcionki

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  font-settings-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci --no-audit --no-fund

      - name: Synchronizuj pliki wersji
        shell: bash
        run: |
          VERSION_NAME="$(awk -F= '$1=="VERSION_NAME" {print $2}' android/version.properties)"
          VERSION_CODE="$(awk -F= '$1=="VERSION_CODE" {print $2}' android/version.properties)"
          node tools/run_python.js tools/set_version.py "$VERSION_NAME" "$VERSION_CODE" --sync

      - name: Zbuduj pliki webowe
        run: npm run prepare:web

      - name: Sprawdź składnię JavaScript
        run: npm run lint:js

      - name: Sprawdź formatowanie
        run: npm run format:check

      - name: Test projektu
        run: npm run test:project

      - name: Test architektury
        run: npm run test:architecture

      - name: Test wyglądu i czcionki
        run: npm run test:visual

      - name: Test ekranu dzisiaj
        run: npm run test:today

      - name: Test kalendarza i historii
        run: npm run test:calendar-history

      - name: Test profili i statystyk
        run: npm run test:profile-stats

      - name: Test ustawień
        run: npm run test:settings

      - name: Test powiadomień
        run: npm run test:notifications

      - name: Test PWA etapu 11
        run: npm run test:pwa-stage11

      - name: Testy końcowe
        run: npm run test:final

      - name: Test PWA HTTP
        run: npm run test:pwa

      - name: Test kopii
        run: npm run test:backup

      - name: Test bezpieczeństwa
        run: npm run test:security

      - name: Test WebView
        run: npm run test:webview
