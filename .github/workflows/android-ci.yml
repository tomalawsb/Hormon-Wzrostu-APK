name: Testy i automatyczne wydanie APK

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

aenv: {}

env:
  HAS_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
  RELEASE_PR: ${{ github.event_name == 'pull_request' && github.head_ref == 'release-1.0.12' }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Testy i APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Ustaw Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ustaw Android SDK
        uses: android-actions/setup-android@v3

      - name: Zainstaluj Android API 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Zainstaluj zależności
        run: npm ci --no-audit --no-fund

      - name: Zastosuj poprawki 1.0.12
        if: env.RELEASE_PR == 'true'
        run: python3 tools/apply_fix_1012.py

      - name: Zbuduj pliki aplikacji
        run: npm run prepare:web

      - name: Uruchom testy
        run: npm test

      - name: Zbuduj APK debug do kontroli
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleDebug --stacktrace

      - name: Udostępnij APK debug jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: Dzienniczek-Hormonu-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Wymagaj sekretów podpisu dla wydania
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING != 'true'
        shell: bash
        run: |
          echo "Brak sekretów podpisu Androida."
          exit 1

      - name: Odtwórz prywatny klucz podpisu
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/dzienniczek-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/dzienniczek-signing/dzienniczek-release.p12"
          test -s "$RUNNER_TEMP/dzienniczek-signing/dzienniczek-release.p12"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/dzienniczek-signing/dzienniczek-release.p12" >> "$GITHUB_ENV"

      - name: Zbuduj podpisany APK i AAB
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING == 'true'
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease bundleRelease --stacktrace

      - name: Przygotuj pliki wydania
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING == 'true'
        shell: bash
        run: |
          VERSION_NAME="$(awk -F= '$1=="VERSION_NAME" {print $2}' android/version.properties)"
          VERSION_CODE="$(awk -F= '$1=="VERSION_CODE" {print $2}' android/version.properties)"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION_NAME" >> "$GITHUB_ENV"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/Dzienniczek_Hormonu_v${VERSION_NAME}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist/Dzienniczek_Hormonu_v${VERSION_NAME}.aab"
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Zweryfikuj podpis
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING == 'true'
        shell: bash
        run: |
          APK_FILE="$(find dist -maxdepth 1 -name '*.apk' -print -quit)"
          AAB_FILE="$(find dist -maxdepth 1 -name '*.aab' -print -quit)"
          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK_FILE"
          jarsigner -verify "$AAB_FILE"

      - name: Udostępnij podpisane pliki jako artefakt
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Dzienniczek-Hormonu-release-${{ env.VERSION_NAME }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Zapisz poprawioną wersję na main
        if: env.RELEASE_PR == 'true'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Wersja 1.0.12 - centrowanie i obsługa odłożonych ampułek'
          git push origin HEAD:main

      - name: Utwórz automatyczne wydanie GitHub
        if: (github.event_name != 'pull_request' || env.RELEASE_PR == 'true') && env.HAS_SIGNING == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Wydanie $RELEASE_TAG już istnieje."
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            dist/*.apk \
            dist/*.aab \
            dist/SHA256SUMS.txt \
            --target "$GITHUB_SHA" \
            --title "Dzienniczek Hormonu $RELEASE_TAG" \
            --notes "Automatyczne wydanie wersji $VERSION_NAME (versionCode $VERSION_CODE)."
