name: Zastosuj poprawkę interfejsu 1.0.7

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-ui-fix-v107.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-ui-fix-v107
  cancel-in-progress: false

jobs:
  apply-fix:
    name: Popraw PWA i ustawienia
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Zastosuj poprawkę i podnieś wersję
        run: python tools/apply_ui_fix_v107.py

      - name: Zainstaluj zależności
        run: npm ci --no-audit --no-fund

      - name: Zbuduj kompletne pliki PWA i Androida
        run: npm run prepare:web

      - name: Uruchom testy
        run: npm test

      - name: Zapisz poprawione pliki w repozytorium
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Brak nowych zmian do zapisania."
            exit 0
          fi
          git commit -m "Wersja 1.0.7 - poprawa PWA i widoczne aktualizacje"
          git push
