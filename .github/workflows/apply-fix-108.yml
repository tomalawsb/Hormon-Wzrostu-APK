name: Jednorazowa poprawka APK 1.0.8

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-fix-108
  cancel-in-progress: false

jobs:
  apply-fix:
    name: Popraw wersję APK i propozycję miejsca
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustaw Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Zainstaluj zależności
        run: npm ci --no-audit --no-fund

      - name: Zastosuj poprawkę 1.0.8
        run: python3 tools/apply_fix_108.py

      - name: Zbuduj pliki PWA i Androida
        run: npm run prepare:web

      - name: Uruchom testy
        run: npm test

      - name: Zapisz finalne poprawki
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Brak zmian do zapisania."
            exit 0
          fi
          git commit -m "Wersja 1.0.8 - poprawna wersja APK i aktualizacje"
          git push origin main
