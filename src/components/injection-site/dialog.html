
  <dialog id="place-picker-dialog" class="place-picker-dialog" aria-labelledby="place-picker-title">
    <div class="place-picker-content">
      <div class="dialog-header dialog-header--compact">
        <div>
          <p class="eyebrow">Miejsce wkłucia</p>

      <div class="dialog-actions">

      </div>
